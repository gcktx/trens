# ═══════════════════════════════════════════════════════════════
#                   TrendRadar 时间线配置
#                      Version: 1.0.2 (定制版 | 日间每小时推送)
# ═══════════════════════════════════════════════════════════════

presets:
  always_on:
    name: "全天监控"
    description: "全天候监控，有新增立即推送。"
    default:
      collect: true
      analyze: false
      ai_mode: "current"
      push: true
      report_mode: "incremental"
      once:
        analyze: false
        push: false
    periods: {}
    day_plans:
      all_day:
        periods: []
    week_map:
      1: "all_day"
      2: "all_day"
      3: "all_day"
      4: "all_day"
      5: "all_day"
      6: "all_day"
      7: "all_day"

  morning_evening:
    name: "早晚汇总"
    description: "全天推送 + 晚间当日汇总。"
    default:
      collect: true
      analyze: true
      ai_mode: "current"
      push: true
      report_mode: "current"
      once:
        analyze: false
        push: false
    periods:
      evening_summary:
        name: "晚间汇总"
        start: "20:00"
        end: "22:00"
        analyze: true
        ai_mode: "daily"
        report_mode: "daily"
        once:
          analyze: true
          push: true
    day_plans:
      all_day:
        periods: ["evening_summary"]
    week_map:
      1: "all_day"
      2: "all_day"
      3: "all_day"
      4: "all_day"
      5: "all_day"
      6: "all_day"
      7: "all_day"

  office_hours:
    name: "办公时间"
    description: "工作日三段式推送，周末增量自由推。"
    default:
      collect: true
      analyze: false
      ai_mode: "current"
      push: false
      report_mode: "current"
      once:
        analyze: true
        push: true
    periods:
      morning_briefing:
        name: "到岗速览"
        start: "09:00"
        end: "11:00"
        analyze: true
        ai_mode: "current"
        push: true
        report_mode: "current"
      noon_update:
        name: "午间热点"
        start: "13:00"
        end: "15:00"
        push: true
        report_mode: "current"
      closing_summary:
        name: "收工汇总"
        start: "17:00"
        end: "19:00"
        analyze: true
        ai_mode: "daily"
        push: true
        report_mode: "daily"
      weekend_free:
        name: "周末自由"
        start: "08:00"
        end: "23:00"
        ai_mode: "current"
        push: true
        report_mode: "incremental"
        once:
          analyze: false
          push: false
    day_plans:
      workday:
        periods: ["morning_briefing", "noon_update", "closing_summary"]
      weekend:
        periods: ["weekend_free"]
    week_map:
      1: "workday"
      2: "workday"
      3: "workday"
      4: "workday"
      5: "workday"
      6: "weekend"
      7: "weekend"

  night_owl:
    name: "夜猫子模式"
    description: "午后速览 + 深夜全天汇总。"
    default:
      collect: true
      analyze: false
      ai_mode: "current"
      push: false
      report_mode: "current"
      once:
        analyze: true
        push: true
    periods:
      afternoon_peek:
        name: "午后速览"
        start: "15:00"
        end: "17:00"
        analyze: true
        ai_mode: "current"
        push: true
        report_mode: "current"
      late_night:
        name: "深夜汇总"
        start: "22:00"
        end: "01:00"
        analyze: true
        ai_mode: "daily"
        push: true
        report_mode: "daily"
    day_plans:
      all_day:
        periods: ["afternoon_peek", "late_night"]
    week_map:
      1: "all_day"
      2: "all_day"
      3: "all_day"
      4: "all_day"
      5: "all_day"
      6: "all_day"
      7: "all_day"

# ═══════════════════════════════════════════════════════════════
# 5️⃣ 自定义模式 (已更新：日间每小时推送)
# ═══════════════════════════════════════════════════════════════
custom:
  name: "日间每小时推送 (08:00-20:50)"
  description: "白天每小时整点推送一次；21:00-次日08:00 仅静默采集。"

  # 默认配置 (兜底策略：静默采集)
  default:
    collect: true
    analyze: false
    ai_mode: "current"
    push: false
    report_mode: "incremental"
    once:
      analyze: false
      push: false

  # 第 1 步：定义时间段积木
  periods:
    # 🌞 日间活跃期：08:00 - 20:50
    day_active:
      name: "日间定时推送"
      start: "08:00"
      end: "20:50"
      collect: true
      push: true
      analyze: false
      ai_mode: "current"
      report_mode: "periodic"      # ✅ 核心修改：改为定时周期模式
      cron: "0 8-20 * * *"         # ✅ 每小时整点触发 (08:00, 09:00 ... 20:00)
      # ⚠️ 兼容提示：若 TrendRadar 不支持 cron，请替换为以下之一：
      # schedule_type: "hourly"
      # interval_minutes: 60
      once:
        push: false                # ✅ 关闭事件驱动，严格遵循定时节奏

    # 🌙 夜间静默期：21:00 - 次日 08:00 (跨天)
    night_silent:
      name: "夜间静默采集"
      start: "21:00"
      end: "08:00"
      collect: true
      push: false
      analyze: false

  # 第 2 步 & 第 3 步：日计划与周映射
  day_plans:
    all_day:
      periods: ["day_active", "night_silent"]
  
  week_map:
    1: "all_day"
    2: "all_day"
    3: "all_day"
    4: "all_day"
    5: "all_day"
    6: "all_day"
    7: "all_day"

  # ✅ 冲突策略：后定义优先
  overlap:
    policy: "last_wins"
