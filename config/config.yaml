app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: true
  preset: "morning_evening"

platforms:
  - id: "toutiao"
    name: "今日头条"
  - id: "baidu"
    name: "百度热搜"
  - id: "zhihu"
    name: "知乎"
  - id: "weibo"
    name: "微博"
  - id: "wallstreetcn-hot"
    name: "华尔街见闻 最热"
  - id: "cls-hot"
    name: "财联社热门"
  - id: "ithome"
    name: "IT之家"
  - id: "github"
    name: "GitHub"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 3
  feeds:
    - id: "wallstreetcn"
      name: "华尔街见闻"
      url: "https://wallstreetcn.com/feed"
      max_age_days: 1
    - id: "caixin-finance"
      name: "财新金融"
      url: "https://www.caixin.com/rss/finance.xml"
      max_age_days: 3

report:
  mode: "current"
  display_mode: "keyword"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0

display:
  region_order:
    - new_items
    - hotlist
    - rss
    - standalone
    - ai_analysis
  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: false
    ai_analysis: true
  standalone:
    platforms: ["zhihu", "wallstreetcn-hot"]
    rss_feeds: []
    max_items: 20

notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
    bark:
      url: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0

ai:
  model: "deepseek/deepseek-chat"
  api_key: ""
  timeout: 120
  temperature: 1.0
  max_tokens: 5000

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: false
  include_standalone: true
  include_rank_timeline: true

ai_translation:
  enabled: false
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"

advanced:
  debug: false
  crawler:
    request_interval: 2000
    use_proxy: false
  rss:
    request_interval: 1000
    timeout: 15
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  batch_size:
    default: 4000
  batch_send_interval: 3
