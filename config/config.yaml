# ═══════════════════════════════════════════════════════════════
# TrendRadar 配置文件 (已修复结构错误版)
# Version: 2.0.0
# ═══════════════════════════════════════════════════════════════

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: true
  preset: "morning_evening"

# ✅ 关键修复：platforms 必须包含 enabled 和 sources 键
platforms:
  enabled: true
  sources:
    # === 综合新闻媒体类 ===
    - id: "toutiao"
      name: "今日头条"
    - id: "baidu"
      name: "百度热搜"
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "ifeng"
      name: "凤凰网"
    - id: "cankaoxiaoxi"
      name: "参考消息"
    - id: "zaobao"
      name: "联合早报"
    
    # === 财经投资类 ===
    - id: "wallstreetcn-hot"
      name: "华尔街见闻 最热"
    - id: "wallstreetcn-quick"
      name: "华尔街见闻 快讯"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "cls-telegraph"
      name: "财联社 电报"
    - id: "jin10"
      name: "金十数据"
    - id: "xueqiu"
      name: "雪球"

    # === 社交/短视频/娱乐类 ===
    - id: "weibo"
      name: "微博"
    - id: "douyin"
      name: "抖音"
    - id: "bilibili-hot-search"
      name: "bilibili 热搜"
    - id: "tieba"
      name: "贴吧"
    - id: "zhihu"
      name: "知乎"
    - id: "hupu"
      name: "虎扑"

    # === 科技类平台 ===
    - id: "ithome"
      name: "IT之家"
    - id: "juejin"
      name: "掘金"
    - id: "github"
      name: "GitHub"
    - id: "hackernews"
      name: "Hacker News"
    - id: "v2ex"
      name: "V2EX"
    - id: "sspai"
      name: "少数派"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 3
  feeds:
    # --- 核心财经 ---
    - id: "wallstreetcn"
      name: "华尔街见闻"
      url: "https://wallstreetcn.com/feed"
      max_age_days: 1
    - id: "caixin-finance"
      name: "财新金融"
      url: "https://www.caixin.com/rss/finance.xml"
      max_age_days: 3
    - id: "cls-telegraph-rss"
      name: "财联社电报"
      url: "https://www.cls.cn/feed"
      max_age_days: 1
    
    # --- 全球宏观 ---
    - id: "economist-finance"
      name: "The Economist (Finance)"
      url: "https://www.economist.com/finance-and-economics/rss.xml"
      max_age_days: 5
    - id: "reuters-business"
      name: "Reuters Business"
      url: "https://www.reutersagency.com/feed/?best-topics=bus&post_type=best"
      max_age_days: 2
    
    # --- 个人理财/博客 ---
    - id: "ruanyifeng"
      name: "阮一峰的网络日志"
      url: "http://www.ruanyifeng.com/blog/atom.xml"
      max_age_days: 7
    - id: "hacker-news"
      name: "Hacker News"
      url: "https://hnrss.org/frontpage"
      max_age_days: 2

report:
  mode: "current"
  display_mode: "keyword"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0

display:
  region_order:
    - new_items
    - hotlist
    - rss
    - standalone
    - ai_analysis
  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: false
    ai_analysis: false  # ⚠️ 暂时关闭 AI 分析，确保爬虫先跑通
  standalone:
    platforms: ["zhihu", "wallstreetcn-hot"]
    rss_feeds: []
    max_items: 20

# ⚠️ 暂时关闭通知，防止因 webhook 为空或格式问题导致潜在错误
notification:
  enabled: false
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    telegram:
      bot_token: ""
      chat_id: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0

ai:
  model: "deepseek/deepseek-chat"
  api_key: ""
  timeout: 120
  temperature: 1.0
  max_tokens: 5000

ai_analysis:
  enabled: false  # ⚠️ 暂时关闭
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 50
  include_rss: false
  include_standalone: false
  include_rank_timeline: false

ai_translation:
  enabled: false
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"

advanced:
  debug: false
  crawler:
    request_interval: 2000
    use_proxy: false
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  batch_size:
    default: 4000
  batch_send_interval: 3
